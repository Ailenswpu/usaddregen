<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Random address generator for US, Nigeria, Egypt, Turkey, and Pakistan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="0.58" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e9f7f4"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f7b6c"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1e293b" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1048" cy="76" r="210" fill="#dff8f2" opacity="0.75"/>
  <circle cx="88" cy="574" r="270" fill="#e8f1ff" opacity="0.8"/>

  <g transform="translate(74 68)">
    <g transform="translate(0 0)">
      <path d="M30 0C13.8 0 1 12.8 1 28.7C1 49.4 30 71 30 71s29-21.6 29-42.3C59 12.8 46.2 0 30 0Z" fill="#0f7b6c"/>
      <circle cx="30" cy="28.4" r="12.4" fill="#fff"/>
    </g>
    <text x="78" y="31" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="800" fill="#18212f">USAddrGen</text>
    <text x="78" y="62" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#607086">Synthetic address data for testing</text>
  </g>

  <g transform="translate(76 206)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="62" font-weight="900" fill="#101827">Random Address</text>
    <text x="0" y="72" font-family="Inter, Arial, Helvetica, sans-serif" font-size="62" font-weight="900" fill="url(#title)">Generator</text>
    <text x="0" y="126" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#425166">US tax-free states + NG, EG, TR, PK</text>
    <text x="0" y="166" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" fill="#607086">Realistic-format postal codes and phone numbers.</text>
  </g>

  <g transform="translate(76 446)">
    <g>
      <rect x="0" y="0" width="88" height="44" rx="22" fill="#0f7b6c"/>
      <text x="44" y="29" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#fff">US</text>
    </g>
    <g transform="translate(104 0)">
      <rect x="0" y="0" width="88" height="44" rx="22" fill="#e9f7f4" stroke="#bfe8dc"/>
      <text x="44" y="29" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#0f6b5f">NG</text>
    </g>
    <g transform="translate(208 0)">
      <rect x="0" y="0" width="88" height="44" rx="22" fill="#e9f7f4" stroke="#bfe8dc"/>
      <text x="44" y="29" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#0f6b5f">EG</text>
    </g>
    <g transform="translate(312 0)">
      <rect x="0" y="0" width="88" height="44" rx="22" fill="#e9f7f4" stroke="#bfe8dc"/>
      <text x="44" y="29" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#0f6b5f">TR</text>
    </g>
    <g transform="translate(416 0)">
      <rect x="0" y="0" width="88" height="44" rx="22" fill="#e9f7f4" stroke="#bfe8dc"/>
      <text x="44" y="29" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#0f6b5f">PK</text>
    </g>
  </g>

  <g transform="translate(650 106)" filter="url(#softShadow)">
    <rect width="474" height="398" rx="24" fill="#fff" stroke="#dbe3ee"/>
    <g transform="translate(38 34)">
      <rect x="0" y="0" width="158" height="42" rx="21" fill="#e9f7f4"/>
      <text x="22" y="28" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#0f6b5f">Pakistan</text>
      <text x="300" y="27" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" fill="#7a8798">Generated now</text>
    </g>

    <g transform="translate(38 106)">
      <rect width="398" height="150" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="26" y="42" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="900" fill="#6b788a">FULL ADDRESS</text>
      <text x="26" y="82" font-family="Inter, Arial, Helvetica, sans-serif" font-size="29" font-weight="900" fill="#18212f">Ayesha Khan</text>
      <text x="26" y="116" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#18212f">Blue Area Road</text>
      <text x="26" y="144" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#18212f">Islamabad 44000, Pakistan</text>
    </g>

    <g transform="translate(38 286)">
      <rect width="184" height="74" rx="12" fill="#fff" stroke="#e5ebf2"/>
      <text x="18" y="28" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#6b788a">COUNTRY</text>
      <text x="18" y="55" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#18212f">PK / +92</text>
    </g>
    <g transform="translate(252 286)">
      <rect width="184" height="74" rx="12" fill="#fff" stroke="#e5ebf2"/>
      <text x="18" y="28" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#6b788a">POSTAL CODE</text>
      <text x="18" y="55" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#18212f">44000</text>
    </g>
  </g>

  <text x="76" y="574" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#0f7b6c">usaddregen.com</text>
  <text x="820" y="574" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" fill="#607086">Free browser-based test data</text>
</svg>
